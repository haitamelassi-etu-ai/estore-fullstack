<section class="auth-wrapper">
  <div class="card auth-card">
    <div class="card-body p-4 p-md-5">
      <h1 class="h3 mb-2">Sign in</h1>
      <p class="text-secondary mb-4">Access your E-Store account.</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
          <label class="form-label" for="loginEmail">Email</label>
          <input
            id="loginEmail"
            type="email"
            class="form-control"
            formControlName="email"
            [class.is-invalid]="form.controls.email.touched && form.controls.email.invalid"
          />
          <div class="invalid-feedback" *ngIf="form.controls.email.touched && form.controls.email.errors?.['required']">
            Email is required.
          </div>
          <div class="invalid-feedback" *ngIf="form.controls.email.touched && form.controls.email.errors?.['email']">
            Enter a valid email.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="loginPassword">Password</label>
          <input
            id="loginPassword"
            type="password"
            class="form-control"
            formControlName="password"
            [class.is-invalid]="form.controls.password.touched && form.controls.password.invalid"
          />
          <div class="invalid-feedback" *ngIf="form.controls.password.touched && form.controls.password.errors?.['required']">
            Password is required.
          </div>
          <div class="invalid-feedback" *ngIf="form.controls.password.touched && form.controls.password.errors?.['minlength']">
            Password must be at least 6 characters.
          </div>
        </div>

        <div class="alert alert-danger py-2" *ngIf="serverError">{{ serverError }}</div>

        <button class="btn btn-warning w-100 mt-2" type="submit" [disabled]="loading">
          {{ loading ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>

      <p class="mb-0 mt-3 text-secondary">
        No account?
        <a routerLink="/auth/register">Create one</a>
      </p>
    </div>
  </div>
</section>
